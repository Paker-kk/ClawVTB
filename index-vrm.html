<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACAT 3D</title>
<script type="importmap">
{
  "imports": {
    "three": "./node_modules/three/build/three.module.js",
    "three/addons/": "./node_modules/three/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  *::-webkit-scrollbar { display: none; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  }
  #stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #stage:active { cursor: grabbing; }
  #stage canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  .vrm-controls {
    position: absolute;
    left: 50%;
    bottom: 14px;
    display: flex;
    gap: 8px;
    transform: translateX(-50%) translateY(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s ease, transform 0.16s ease;
    z-index: 5;
  }
  body:hover .vrm-controls,
  .vrm-controls:focus-within,
  .vrm-controls.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .vrm-button {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,0.42);
    border-radius: 8px;
    background: rgba(20, 22, 30, 0.58);
    color: rgba(255,255,255,0.92);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(12px);
  }
  .vrm-button svg {
    width: 17px;
    height: 17px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }
  .vrm-button.is-muted {
    color: rgba(255,170,170,0.95);
  }
  .vrm-button .model-badge {
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
  }
  .input-bar {
    position: absolute;
    left: 50%;
    bottom: 58px;
    width: min(280px, calc(100vw - 28px));
    display: flex;
    gap: 8px;
    transform: translateX(-50%) translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s ease, transform 0.16s ease;
    z-index: 6;
  }
  .input-bar.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .input-bar input {
    min-width: 0;
    flex: 1;
    height: 36px;
    border: 1px solid rgba(255,255,255,0.42);
    border-radius: 8px;
    background: rgba(20, 22, 30, 0.64);
    color: white;
    padding: 0 12px;
    outline: none;
    backdrop-filter: blur(12px);
  }
  .input-bar button {
    width: 40px;
    height: 36px;
    border: 0;
    border-radius: 8px;
    background: rgba(255, 139, 94, 0.86);
    color: white;
    cursor: pointer;
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="stage"></div>
<div class="input-bar" id="inputBar">
  <input id="chatInput" type="text" placeholder="Say something..." autocomplete="off">
  <button id="sendButton" type="button">Go</button>
</div>
<div class="vrm-controls" id="vrmControls">
  <button class="vrm-button" id="btnChat" type="button" title="Chat" aria-label="Chat">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="vrm-button" id="btnVoice" type="button" title="Voice" aria-label="Voice">
    <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/><path d="M8 22h8"/></svg>
  </button>
  <button class="vrm-button" id="btnScreenshot" type="button" title="Screenshot" aria-label="Screenshot">
    <svg viewBox="0 0 24 24"><path d="M4 7h4l2-3h4l2 3h4v13H4z"/><circle cx="12" cy="13" r="3"/></svg>
  </button>
  <button class="vrm-button" id="btnModelSwitch" type="button" title="Switch model" aria-label="Switch model">
    <span class="model-badge" id="modelBadge">AI</span>
  </button>
  <button class="vrm-button" id="btnImportVrm" type="button" title="Import VRM" aria-label="Import VRM">
    <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M5 21h14"/></svg>
  </button>
</div>
<script type="module" src="./index-vrm.js"></script>
</body>
</html>
